<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Criar Conta</h2>

    <form [formGroup]="form">
      <div class="mb-4">
        <label class="block text-gray-700 mb-1" for="name">Nome completo</label>
        <input
          id="name"
          type="text"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="João da Silva"
          formControlName="nome"
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-1" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="seuemail@exemplo.com"
          formControlName="email"
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-1" for="password">Senha</label>
        <input
          id="password"
          type="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="********"
          formControlName="senha"
        />
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 mb-1" for="confirmPassword">Confirmar Senha</label>
        <input
          id="confirmPassword"
          type="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="********"
          formControlName="confirmarSenha"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition"
        [ngClass]="{'bg-stone-400': !form.valid, 'hover:bg-stone-400': !form.valid}"
        (click)="register()"
        [disabled]="!form.valid"
      >
        Registrar
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-600">
      Já tem uma conta?
      <a href="#" class="text-blue-600 hover:underline" [routerLink]="['/login']">Entrar</a>
    </p>
  </div>
</div>
