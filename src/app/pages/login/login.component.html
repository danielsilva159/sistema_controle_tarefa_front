<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Entrar na Conta</h2>

    <form [formGroup]="form">
      <div class="mb-4">
        <label class="block text-gray-700 mb-1" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="seuemail@exemplo.com"
          formControlName="email"
        />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-1" for="password">Senha</label>
        <input
          id="password"
          type="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="********"
          formControlName="senha"
        />
      </div>

      <div class="flex items-center justify-between mb-6">
        <label class="flex items-center">
          <input type="checkbox" class="form-checkbox text-blue-600" />
          <span class="ml-2 text-gray-700 text-sm">Lembrar-me</span>
        </label>
        <a href="#" class="text-sm text-blue-600 hover:underline">Esqueceu a senha?</a>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white mb-1 font-semibold py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition cursor-pointer"
        (click)="entrar()"
        [disabled]="!form.valid"
      >
        Entrar
      </button>
      <button
      type="button"
        class="w-full bg-yellow-600 text-white  font-semibold py-2 rounded-lg hover:bg-yellow-300 transition cursor-pointer"
        [routerLink]="['/registrar']"
      >
        Registar
      </button>
    </form>
