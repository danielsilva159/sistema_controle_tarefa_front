<div class="min-h-screen bg-gray-100 p-6">
  <h1 class="text-3xl font-bold text-gray-800 mb-6">Meu Quadro de Tarefas</h1>
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <!-- Coluna: A Fazer -->
    <div class="bg-white rounded-xl shadow p-4">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">📝 A Fazer</h2>
      <div class="space-y-4">
        <div class="bg-gray-50 p-3 rounded-lg shadow border border-gray-200">
          <h3 class="font-semibold text-gray-800">Criar tela de login</h3>
          <p class="text-sm text-gray-500">Responsável: João</p>
        </div>
        <div class="bg-gray-50 p-3 rounded-lg shadow border border-gray-200">
          <h3 class="font-semibold text-gray-800">Modelar banco de dados</h3>
          <p class="text-sm text-gray-500">Responsável: Ana</p>
        </div>
      </div>
    </div>

    <!-- Coluna: Em Progresso -->
    <div class="bg-white rounded-xl shadow p-4">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">🚧 Em Progresso</h2>
      <div class="space-y-4">
        <div class="bg-yellow-50 p-3 rounded-lg shadow border border-yellow-200" (click)="abrirTarefa()">
          <h3 class="font-semibold text-gray-800">Criar API de login</h3>
          <p class="text-sm text-gray-500">Responsável: Pedro</p>
        </div>
      </div>
    </div>

    <!-- Coluna: Concluído -->
    <div class="bg-white rounded-xl shadow p-4">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">✅ Concluído</h2>
      <div class="space-y-4">
        <div class="bg-green-50 p-3 rounded-lg shadow border border-green-200">
          <h3 class="font-semibold text-gray-800">Configurar projeto Angular</h3>
          <p class="text-sm text-gray-500">Responsável: Lucas</p>
        </div>
      </div>
    </div>
  </div>
</div>
<app-detalhar-tarefa
    *ngIf="selectedTarefa"
    [tarefa]="selectedTarefa"
    (fechar)="fecharModal()"
    >
  </app-detalhar-tarefa>
<app-criar-tarefa></app-criar-tarefa>
