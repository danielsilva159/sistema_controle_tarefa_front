<div class="min-h-screen bg-gray-100 p-6">
  <h1 class="text-3xl font-bold text-gray-800 mb-6">Meu Quadro de Tarefas</h1>
  <svg
    (click)="dialogNovaTarefa()"
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="1.5"
    stroke="currentColor"
    class="size-6 add cursor-pointer"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
    />
  </svg>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <!-- Coluna: A Fazer -->
    <div
      class="bg-white rounded-xl shadow p-4"
      cdkDropList
      [cdkDropListData]="fazer"
      #start="cdkDropList"
      (cdkDropListDropped)="mover($event, 1)"
      [cdkDropListConnectedTo]="[progress, end]"
    >
      <h2 class="text-xl font-semibold text-gray-700 mb-4">📝 A Fazer</h2>
      <div class="space-y-4" *ngFor="let tarefa of fazer">
        <app-card-tarefa
          [tarefa]="tarefa"
          (abrir)="abrirTarefa($event)"
          (deletar)="listarTarefas()"
          cdkDrag
        ></app-card-tarefa>
      </div>
    </div>

    <!-- Coluna: Em Progresso -->
    <div
      class="bg-white rounded-xl shadow p-4"
      cdkDropList
      #progress="cdkDropList"
      [cdkDropListData]="progresso"
      (cdkDropListDropped)="mover($event, 2)"
      [cdkDropListConnectedTo]="[start, end]"
    >
      <h2 class="text-xl font-semibold text-gray-700 mb-4">🚧 Em Progresso</h2>
      <div class="space-y-4" *ngFor="let tarefa of progresso">
        <app-card-tarefa
          [tarefa]="tarefa"
          (abrir)="abrirTarefa($event)"
          (deletar)="listarTarefas()"
          cdkDrag
        ></app-card-tarefa>
      </div>
    </div>

    <!-- Coluna: Concluído -->
    <div
      class="bg-white rounded-xl shadow p-4"
      cdkDropList
      #end="cdkDropList"
      [cdkDropListData]="concluida"
      (cdkDropListDropped)="mover($event, 3)"
      [cdkDropListConnectedTo]="[progress, start]"
    >
      <h2 class="text-xl font-semibold text-gray-700 mb-4">✅ Concluído</h2>
      <div class="space-y-4" *ngFor="let tarefa of concluida">
        <app-card-tarefa
          [tarefa]="tarefa"
          (abrir)="abrirTarefa($event)"
          (deletar)="listarTarefas()"
          cdkDrag
        ></app-card-tarefa>
      </div>
    </div>
  </div>
</div>
<app-detalhar-tarefa
  *ngIf="selectedTarefa && !edicao"
  [tarefa]="selectedTarefa"
  (fechar)="selectedTarefa = null"
  (editarTarefa)="editarTarefa($event)"
>
</app-detalhar-tarefa>
<app-criar-tarefa
  *ngIf="novaTarefa || edicao"
  (fechar)="fecharModal()"
  (salvar)="SalvarTarefa()"
  [tarefa]="selectedTarefa"
></app-criar-tarefa>
