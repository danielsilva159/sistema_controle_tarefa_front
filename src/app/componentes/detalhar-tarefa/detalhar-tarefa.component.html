<!-- Overlay -->
<div
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
>
  <!-- Modal -->
  <div class="bg-white rounded-lg shadow-lg w-full max-w-lg p-6 relative">
    <!-- Botão de fechar -->
    <button
      class="absolute top-3 right-3 text-gray-500 hover:text-red-600 text-xl font-bold cursor-pointer"
      aria-label="Fechar"
      (click)="onClose()"
    >
      &times;
    </button>

    <!-- Cabeçalho -->
    <h2 class="text-2xl font-bold text-gray-800 mb-4">Detalhes da Tarefa</h2>

    <!-- Conteúdo -->
    <div class="space-y-4">
      <div>
        <p class="text-sm text-gray-500">Título:</p>
        <p class="text-lg font-medium text-gray-800">{{ tarefa?.titulo }}</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Descrição:</p>
        <p class="text-gray-700">{{ tarefa?.descricao }}</p>
      </div>

      <div class="flex justify-between">
        <div>
          <p class="text-sm text-gray-500">Responsável:</p>
          <p class="text-gray-800 font-medium">{{ tarefa?.responsavel }}</p>
        </div>

        <div>
          <p class="text-sm text-gray-500">Status:</p>
          <span
            class="inline-block px-2 py-1 bg-yellow-100 text-yellow-800 text-sm rounded"
          >
            {{ tarefa?.status }}
          </span>
        </div>
      </div>

      <div>
        <p class="text-sm text-gray-500">Data de Vencimento:</p>
        <p class="text-gray-800 font-medium">
          {{ tarefa?.vencimento | date : "dd/MM/yyyy" }}
        </p>
      </div>
    </div>

    <!-- Rodapé -->
    <div class="mt-6 flex justify-end gap-2">
      <button
        class="px-4 py-2 rounded bg-gray-200 text-gray-800 hover:bg-gray-300 cursor-pointer"
        (click)="onClose()"
      >
        Fechar
      </button>
      <button
        class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700 cursor-pointer"
        (click)="editar(tarefa!)"
      >
        Editar
      </button>
    </div>
  </div>
</div>
