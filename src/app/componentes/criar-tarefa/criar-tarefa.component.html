<!-- Overlay -->
<div class="fixed inset-0  bg-opacity-50 flex items-center justify-center z-50">
  <!-- Modal -->
  <div class="bg-white rounded-lg shadow-lg w-full max-w-lg p-6 relative">

    <!-- Botão de fechar -->
    <button
      class="absolute top-3 right-3 text-gray-500 hover:text-red-600 text-xl font-bold"
      aria-label="Fechar"
      (click)="onCancel()"
    >
      &times;
    </button>

    <h2 class="text-2xl font-bold text-gray-800 mb-6">Criar Nova Tarefa</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <!-- Título -->
      <div class="mb-4">
        <label class="block text-sm text-gray-600 mb-1" for="titulo">Título</label>
        <input
          id="titulo"
          formControlName="titulo"
          type="text"
          class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Ex: Criar tela de login"
        />
      </div>

      <!-- Descrição -->
      <div class="mb-4">
        <label class="block text-sm text-gray-600 mb-1" for="descricao">Descrição</label>
        <textarea
          id="descricao"
          formControlName="descricao"
          rows="3"
          class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Descreva a tarefa..."
        ></textarea>
      </div>

      <!-- Responsável -->
      <div class="mb-4">
        <label class="block text-sm text-gray-600 mb-1" for="responsavel">Responsável</label>
        <input
          id="responsavel"
          formControlName="responsavel"
          type="text"
          class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Data de vencimento -->
      <div class="mb-4">
        <label class="block text-sm text-gray-600 mb-1" for="vencimento">Data de Vencimento</label>
        <input
          id="vencimento"
          formControlName="vencimento"
          type="date"
          class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Status -->
      <div class="mb-6">
        <label class="block text-sm text-gray-600 mb-1" for="status">Status</label>
        <select
          id="status"
          formControlName="status"
          class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="A Fazer">A Fazer</option>
          <option value="Em Progresso">Em Progresso</option>
          <option value="Concluído">Concluído</option>
        </select>
      </div>

      <!-- Botões -->
      <div class="flex justify-end gap-3">
        <button
          type="button"
          class="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400"
          (click)="onCancel()"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="form.invalid"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50"
        >
          Criar Tarefa
        </button>
      </div>
    </form>
  </div>
</div>
